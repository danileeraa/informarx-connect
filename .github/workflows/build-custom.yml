name: Build Informarx Connect

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  build-windows:
    name: Windows x86_64
    runs-on: windows-2022

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Export GitHub Actions cache env
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: ${{ runner.workspace }}/vcpkg
        vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

    - name: Install vcpkg dependencies
      run: |
        $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"
      shell: bash
      working-directory: ${{ github.workspace }}

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Set up MSVC dev environment
      uses: ilammy/msvc-dev-cmd@v1

    - name: Set vcpkg environment
      run: |
        $vcpkg = $env:VCPKG_ROOT
        echo "VCPKG_ROOT=$vcpkg" >> $env:GITHUB_ENV
        $include = "$vcpkg/installed/x64-windows-static/include"
        $lib = "$vcpkg/installed/x64-windows-static/lib"
        echo "CL=/I$include" >> $env:GITHUB_ENV
        echo "INCLUDE=$include;$env:INCLUDE" >> $env:GITHUB_ENV
        echo "LIB=$lib;$env:LIB" >> $env:GITHUB_ENV

    - name: Debug - List vcpkg include dirs
      run: |
        $vcpkg = $env:VCPKG_ROOT
        Write-Host "VCPKG_ROOT=$vcpkg"
        $incDir = "$vcpkg/installed/x64-windows-static/include"
        Write-Host "Checking $incDir"
        if (Test-Path "$incDir/opus") {
          Get-ChildItem "$incDir/opus" -Name
        } else {
          Write-Host "opus/ directory NOT FOUND in $incDir"
          Get-ChildItem "$incDir" -Directory -Name
        }

    - name: Build
      run: cargo build --release --target x86_64-pc-windows-msvc

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Informarx-Connect-Windows-x64
        path: target/x86_64-pc-windows-msvc/release/informarx-connect.exe
