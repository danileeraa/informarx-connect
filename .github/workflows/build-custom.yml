name: Build Informarx Connect

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  build-windows:
    name: Windows x86_64
    runs-on: windows-2022

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Export GitHub Actions cache env
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: ${{ runner.workspace }}/vcpkg
        vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

    - name: Install vcpkg dependencies
      run: |
        $VCPKG_ROOT/vcpkg install --triplet x64-windows --x-install-root="$VCPKG_ROOT/installed"
      shell: bash
      working-directory: ${{ github.workspace }}

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Set vcpkg environment
      run: |
        echo "VCPKG_ROOT=$env:VCPKG_ROOT" >> $env:GITHUB_ENV
        echo "$env:VCPKG_ROOT/installed/x64-windows/include" >> $env:GITHUB_PATH
        echo "$env:VCPKG_ROOT/installed/x64-windows/lib" >> $env:GITHUB_PATH
        echo "VCPKGRS_DYNAMIC=1" >> $env:GITHUB_ENV

    - name: Build
      run: cargo build --release --target x86_64-pc-windows-msvc

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Informarx-Connect-Windows-x64
        path: target/x86_64-pc-windows-msvc/release/informarx-connect.exe
