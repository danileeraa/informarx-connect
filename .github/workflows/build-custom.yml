name: Build Informarx Connect

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  build-windows:
    name: Windows ${{ matrix.arch.name }}
    runs-on: windows-2022
    strategy:
      matrix:
        arch:
          - name: x64
            target: x86_64-pc-windows-msvc
            triplet: x64-windows-static
            sciter: x64/sciter.dll

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Export GitHub Actions cache env
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: ${{ runner.workspace }}/vcpkg
        vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

    - name: Install vcpkg dependencies
      run: |
        $VCPKG_ROOT/vcpkg install --triplet ${{ matrix.arch.triplet }} --x-install-root="$VCPKG_ROOT/installed"
      shell: bash
      working-directory: ${{ github.workspace }}

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.arch.target }}

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Set up MSVC dev environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch.name == 'x86' && 'x86' || 'amd64' }}

    - name: Set vcpkg environment
      run: |
        $vcpkg = $env:RUNVCPKG_VCPKG_ROOT
        Write-Host "Using VCPKG_ROOT=$vcpkg"
        echo "VCPKG_ROOT=$vcpkg" >> $env:GITHUB_ENV
        $include = "$vcpkg/installed/${{ matrix.arch.triplet }}/include"
        $lib = "$vcpkg/installed/${{ matrix.arch.triplet }}/lib"
        echo "CL=/I$include" >> $env:GITHUB_ENV
        echo "INCLUDE=$include;$env:INCLUDE" >> $env:GITHUB_ENV

    - name: Ensure opus headers in vcpkg install
      run: |
        $vcpkg = $env:RUNVCPKG_VCPKG_ROOT
        $opusIncDir = "$vcpkg/installed/${{ matrix.arch.triplet }}/include/opus"
        if (Test-Path "$opusIncDir/opus_multistream.h") {
          Write-Host "opus headers already present in install dir."
        } else {
          Write-Host "Downloading opus headers from source..."
          $url = "https://raw.githubusercontent.com/xiph/opus/v1.5.2/include"
          New-Item -ItemType Directory -Force -Path $opusIncDir | Out-Null
          @("opus.h","opus_defines.h","opus_multistream.h","opus_projection.h","opus_types.h") | ForEach-Object {
            Invoke-WebRequest -Uri "$url/$_" -OutFile "$opusIncDir/$_" -UseBasicParsing
          }
          Write-Host "Downloaded opus headers to $opusIncDir"
        }

    - name: Generate inline UI resources
      run: python res/inline-sciter.py

    - name: Build
      run: cargo build --release --features inline --target ${{ matrix.arch.target }}

    - name: Download sciter.dll
      run: |
        curl -LJ -o "${{ github.workspace }}/target/${{ matrix.arch.target }}/release/sciter.dll" `
          "https://github.com/c-smile/sciter-sdk/raw/master/bin.win/${{ matrix.arch.sciter }}"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Informarx-Connect-Windows-${{ matrix.arch.name }}
        path: |
          target/${{ matrix.arch.target }}/release/informarx-connect.exe
          target/${{ matrix.arch.target }}/release/sciter.dll